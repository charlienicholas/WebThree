<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Profile</title>
    <link rel="stylesheet" href="./css/output.css" />
  </head>
  <body class="font-main bg-white dark:bg-slate-900 transition-colors duration-300">
    <!-- Navbar Start -->
    <nav class="fixed top-0 w-full bg-white/80 dark:bg-slate-900/80 backdrop-blur-md z-50 border-b border-gray-100 dark:border-slate-800">
      <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
        <div class="flex items-center gap-2 font-bold text-xl dark:text-white">
          <span class="text-indigo-600">&lt;/&gt;</span>
          <span>Rizky Dev</span>
        </div>

        <ul class="hidden md:flex items-center gap-8 text-sm font-medium text-gray-600 dark:text-gray-300">
          <li class="relative">
            <a href="#" class="text-indigo-600">Home</a>
            <div class="absolute -bottom-7.25 left-0 w-full h-0.5 bg-indigo-600"></div>
          </li>
          <li><a href="#" class="hover:text-indigo-600 transition">About</a></li>
          <li><a href="#" class="hover:text-indigo-600 transition">Projects</a></li>
          <li><a href="#" class="hover:text-indigo-600 transition">Skills</a></li>
          <li><a href="#" class="hover:text-indigo-600 transition">Contact</a></li>
        </ul>

        <div class="flex items-center gap-4">
          <button id="theme-btn" class="relative w-12 h-6 rounded-full bg-gray-200 dark:bg-slate-700 transition-colors flex items-center px-1">
            <div class="dot w-4 h-4 bg-white dark:bg-indigo-400 rounded-full shadow-sm transform transition-transform dark:translate-x-6 flex items-center justify-center"></div>
          </button>

          <button id="menu-open" class="md:hidden p-2 text-gray-600 dark:text-white">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
          </button>
        </div>
      </div>
    </nav>

    <div id="side-menu" class="fixed inset-0 z-60 translate-x-full transition-transform duration-300">
      <div id="overlay" class="absolute inset-0 bg-black/20 backdrop-blur-sm"></div>
      <div class="absolute right-0 w-72 h-full bg-white dark:bg-slate-800 p-8 shadow-2xl">
        <button id="menu-close" class="absolute top-6 right-6 text-gray-500">
          <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>

        <ul class="mt-12 space-y-6 text-lg font-semibold dark:text-white">
          <li><a href="#" class="text-indigo-600">Home</a></li>
          <li><a href="#" class="hover:text-indigo-600">About</a></li>
          <li><a href="#" class="hover:text-indigo-600">Projects</a></li>
          <li><a href="#" class="hover:text-indigo-600">Skills</a></li>
          <li><a href="#" class="hover:text-indigo-600">Contact</a></li>
        </ul>
      </div>
    </div>
    <!-- Navbar End -->

    <script src="./js/script.js"></script>
  </body>
</html>
