<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Profile</title>
    <link rel="stylesheet" href="./css/output.css" />
  </head>
  <body class="font-main bg-white dark:bg-slate-900 transition-colors duration-500">
    <!-- Navbar Start -->
    <nav class="fixed top-0 w-full bg-white/80 dark:bg-slate-900/80 backdrop-blur-md z-50 border-b border-gray-200 dark:border-slate-600">
      <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
        <h1 class="font-bold text-xl dark:text-white">Nicho<span class="text-main">Net</span></h1>

        <ul class="hidden md:flex items-center gap-8 text-sm font-medium text-gray-600 dark:text-gray-300">
          <li><a href="#" class="text-main">Home</a></li>
          <li><a href="#" class="hover:text-main transition">About</a></li>
          <li><a href="#" class="hover:text-main transition">Projects</a></li>
          <li><a href="#" class="hover:text-main transition">Skills</a></li>
          <li><a href="#" class="hover:text-main transition">Contact</a></li>
        </ul>

        <div class="flex items-center gap-4">
          <!-- Toggle Theme -->
          <button id="theme-btn" class="relative w-12 h-6 rounded-full bg-gray-200 dark:bg-slate-700 transition-colors flex items-center px-1">
            <div class="dot w-4 h-4 bg-white dark:bg-indigo-400 rounded-full shadow-sm transform transition-transform dark:translate-x-6 flex items-center justify-center"></div>
          </button>

          <!-- Hamburger Menu -->
          <button id="menu-open" class="md:hidden p-2 text-gray-600 dark:text-white">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
          </button>
        </div>
      </div>
    </nav>

    <!-- Bagian side menu -->
    <div id="side-menu" class="fixed inset-0 z-60 translate-x-full transition-transform duration-300">
      <div class="absolute right-0 w-72 h-full bg-blue-100 dark:bg-slate-800 p-8 shadow-2xl rounded-l-2xl">
        <button id="menu-close" class="absolute top-6 right-6 text-gray-500">
          <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>

        <ul class="mt-12 space-y-6 text-lg font-semibold dark:text-white">
          <li><a href="#home" class="target:text-main">Home</a></li>
          <li><a href="#about" class="target:text-main">About</a></li>
          <li><a href="#skill" class="target:text-main">Skills</a></li>
          <li><a href="#project" class="target:text-main">Projects</a></li>
          <li><a href="#contact" class="target:text-main">Contact</a></li>
        </ul>
      </div>
    </div>
    <!-- Navbar End -->

    <!-- Main Section Start -->
    <section class="max-w-7xl mx-auto px-6 py-12">
      <div class="relative overflow-hidden rounded-3xl bg-slate-50 dark:bg-slate-800/50 p-8 md:p-12 flex flex-col md:flex-row items-center justify-between gap-12">
        <div class="flex flex-col md:flex-row items-center md:items-start gap-8 z-10">
          <div class="w-48 h-48 rounded-full overflow-hidden border-4 border-white dark:border-slate-700 shadow-xl shrink-0">
            <img src="https://path-ke-foto-kamu.jpg" alt="Rizky Developer" class="w-full h-full object-cover" />
          </div>

          <div class="text-center md:text-left space-y-4">
            <span class="inline-block px-4 py-1 rounded-full bg-indigo-100 text-indigo-600 text-sm font-semibold"> Hello, I'm </span>

            <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 dark:text-white">Rizky Developer</h1>

            <p class="text-lg font-medium text-indigo-600 dark:text-indigo-400">Learner & Frontend Enthusiast</p>

            <p class="max-w-md text-slate-600 dark:text-slate-400 leading-relaxed">Saya sedang belajar HTML, CSS, JavaScript, dan berlatih membuat website yang fungsional dan menarik.</p>

            <div class="flex items-center justify-center md:justify-start gap-3 pt-4">
              <a href="#" class="p-2 bg-white dark:bg-slate-700 rounded-lg shadow-sm hover:shadow-md transition dark:text-white">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"></svg>
              </a>
              <a href="#" class="p-2 bg-white dark:bg-slate-700 rounded-lg shadow-sm hover:shadow-md transition dark:text-white">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"></svg>
              </a>
              <a href="#" class="p-2 bg-white dark:bg-slate-700 rounded-lg shadow-sm hover:shadow-md transition dark:text-white">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"></svg>
              </a>
              <a href="#" class="p-2 bg-white dark:bg-slate-700 rounded-lg shadow-sm hover:shadow-md transition dark:text-white">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"></svg>
              </a>
            </div>
          </div>
        </div>

        <div class="relative hidden lg:block w-full max-w-sm">
          <img src="https://path-ke-ilustrasi.png" alt="Illustration" class="w-full h-auto drop-shadow-2xl" />

          <div class="absolute -top-4 -right-4 w-24 h-24 bg-indigo-200/30 rounded-full blur-2xl animate-pulse"></div>
          <div class="absolute -bottom-4 -left-4 w-16 h-16 bg-blue-200/30 rounded-full blur-xl"></div>
        </div>
      </div>
    </section>
    <!-- Main Section end -->

    <script src="./js/script.js"></script>
  </body>
</html>
